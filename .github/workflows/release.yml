name: Release (manual → GitHub Packages @latest)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_build.yml
    with:
      publish_tag: latest
      bump: ${{ inputs.bump }}
    secrets: inherit
